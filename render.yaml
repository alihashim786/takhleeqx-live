services:
  - type: web
    name: takhleeqx-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: OPENAI_API_KEY
        sync: false
      - key: CREATOMATE_API_KEY
        sync: false
      - key: CREATOMATE_TEMPLATE_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
